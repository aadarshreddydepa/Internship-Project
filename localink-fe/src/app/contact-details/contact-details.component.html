<div class="container">

<h2>Contact Details</h2>

<form [formGroup]="contactForm">

<label>Phone Number *</label>
<input type="text" formControlName="phone" placeholder="Enter phone number">

<div class="error" *ngIf="contactForm.get('phone')?.touched">

<span *ngIf="contactForm.get('phone')?.errors?.['required']">
Phone number is required
</span>

<span *ngIf="contactForm.get('phone')?.errors?.['pattern']">
Enter a valid 10-digit phone number
</span>

</div>


<label>Email *</label>
<input type="email" formControlName="email" placeholder="Enter email">

<div class="error" *ngIf="contactForm.get('email')?.touched && contactForm.get('email')?.invalid">
Enter a valid email
</div>


<label>Website(Optional)</label>
<input type="text" formControlName="website" placeholder="Enter website">

<div class="error" *ngIf="contactForm.get('website')?.touched && contactForm.get('website')?.invalid">
Enter a valid website URL
</div>


<hr>

<label>Street Address *</label>
<input type="text" formControlName="address" placeholder="Enter business address">

<div class="error" *ngIf="contactForm.get('address')?.touched && contactForm.get('address')?.invalid">
Address is required
</div>


<!-- CITY STATE PINCODE SAME ROW -->
<div class="location-row">

<div class="location-field">
<label>City *</label>
<input type="text" formControlName="city" placeholder="City">

<div class="error" *ngIf="contactForm.get('city')?.touched && contactForm.get('city')?.invalid">
City is required
</div>
</div>


<div class="location-field">
<label>State *</label>
<input type="text" formControlName="state" placeholder="State">

<div class="error" *ngIf="contactForm.get('state')?.touched && contactForm.get('state')?.invalid">
State is required
</div>
</div>


<div class="location-field">
<label>Pincode *</label>
<input type="text" formControlName="pincode" placeholder="Pincode">

<div class="error" *ngIf="contactForm.get('pincode')?.touched && contactForm.get('pincode')?.invalid">
Enter a valid 6 digit pincode
</div>
</div>

</div>


<!-- BUTTONS -->
<div class="button-container">

<button type="button" class="previous-btn" (click)="previousStep()">
Previous
</button>

<button type="button" (click)="submit()">
Next Step
</button>

</div>


</form>



</div>
