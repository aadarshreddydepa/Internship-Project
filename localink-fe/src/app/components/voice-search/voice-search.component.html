<div class="voice-search-container" [class.expanded]="isExpanded">
  <!-- Main Voice Button -->
  <button
    class="voice-btn"
    [class.listening]="state === 'listening'"
    [class.processing]="state === 'processing'"
    [class.error]="state === 'error'"
    (click)="toggleVoiceSearch()"
    [attr.aria-label]="'VOICE.SEARCH_BUTTON' | translate"
    [attr.aria-pressed]="state === 'listening'"
    appAccessibilitySound
    soundType="click"
    role="button"
    tabindex="0"
    (keydown.enter)="toggleVoiceSearch()"
    (keydown.space)="toggleVoiceSearch()">
    
    <!-- Microphone Icon -->
    <svg 
      xmlns="http://www.w3.org/2000/svg" 
      width="20" 
      height="20" 
      viewBox="0 0 24 24" 
      fill="none" 
      stroke="currentColor" 
      stroke-width="2"
      [class.pulse]="state === 'listening'">
      <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <path d="M12 19v3"/>
      <path d="M8 22h8"/>
    </svg>

    <!-- Listening Wave Animation -->
    <div class="wave-animation" *ngIf="state === 'listening'">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- State Text -->
    <span class="state-text" *ngIf="showStateText">
      {{ getStateText() | translate }}
    </span>
  </button>

  <!-- Google-Style Voice Search Modal Overlay -->
  <div class="voice-modal-overlay google-style" *ngIf="transcript || errorMessage || state === 'listening'" (click)="closeModal()">
    <!-- Minimal Centered Voice Modal -->
    <div class="voice-modal google-style" (click)="$event.stopPropagation()">
      
      <!-- Close Button (Top Right) -->
      <button class="close-btn" (click)="closeModal()" [attr.aria-label]="'COMMON.CLOSE' | translate">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <!-- Main Content - Centered -->
      <div class="voice-modal-content google-style">
        
        <!-- Listening State - Red Mic Circle -->
        <div class="listening-container" *ngIf="state === 'listening'">
          <div class="mic-circle">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <path d="M12 19v3"/>
              <path d="M8 22h8"/>
            </svg>
          </div>
          <div class="sound-waves-google">
            <span></span><span></span><span></span><span></span>
          </div>
          <p class="listening-text">{{ 'VOICE.SPEAK_NOW' | translate }}</p>
        </div>

        <!-- Transcript Display -->
        <div class="transcript-container" *ngIf="transcript && state !== 'listening'">
          <p class="transcript-text">{{ transcript }}</p>
          <p class="searching-text" *ngIf="parsedResult?.query">{{ 'VOICE.SEARCHING' | translate }}...</p>
        </div>

        <!-- Error Display -->
        <div class="error-container" *ngIf="errorMessage && state !== 'listening'">
          <p class="error-text">{{ errorMessage }}</p>
          <button class="retry-btn" (click)="retryVoiceSearch()">
            {{ 'VOICE.TRY_AGAIN' | translate }}
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
