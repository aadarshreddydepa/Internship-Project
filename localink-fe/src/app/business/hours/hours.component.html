<div class="container">

  <h3>Business Hours</h3>
  <p class="subtitle">Select days and configure schedule</p>

  <!-- STEP 1 -->

  <div class="card">

    <div class="header">
      <h3>Select Days</h3>

      <div class="actions">
        <button (click)="selectAll()">Select All</button>
        <button (click)="clearSelection()">Clear</button>
      </div>
    </div>

    <!-- <div class="days">

        <div
            class="day"
            *ngFor="let d of days"
            [class.active]="d.selected"
            (click)="d.selected = !d.selected">

            <span>{{d.name}}</span>

            <span class="check" *ngIf="d.selected">✓</span>

        </div>

    </div> -->
    <div class="days">

  <div
    class="day-chip"
    *ngFor="let d of days"
    [class.active]="d.selected"
    (click)="d.selected = !d.selected">

    {{d.name}}

  </div>

</div>
    <button
      class="set-btn"
      *ngIf="selectedDays.length"
      (click)="openConfig()">

      Set Hours for {{selectedDays.length}} Day(s)

    </button>

  </div>

  <!-- CONFIGURE HOURS -->

  <div class="card configure" *ngIf="showConfig && selectedDays.length">

    <h3>Configure Hours</h3>

    <p class="selected-days">
      <span *ngFor="let d of selectedDays; let last = last">
        {{d.name}}{{last ? '' : ', '}}
      </span>
    </p>

    <!-- MODE TOGGLES -->

    <div class="mode-toggle">

      <button
        [class.active]="mode==='custom'"
        (click)="mode='custom'">
        Custom Hours
      </button>

      <button
        [class.active]="mode==='24h'"
        (click)="mode='24h'">
        24 Hours
      </button>

      <button
        [class.active]="mode==='closed'"
        (click)="mode='closed'">
        Closed
      </button>

    </div>

    <!-- TIME SLOTS -->

<div class="slots" *ngIf="mode==='custom'">

  <div
  class="slot-row"
  *ngFor="let slot of configSlots; let i=index">

    <input type="time" [(ngModel)]="slot.open">

    <span class="to">to</span>

    <input type="time" [(ngModel)]="slot.close">

    <!-- ADD SLOT beside first row -->

    <button
      class="add-slot"
      *ngIf="i === 0 && configSlots.length < 2"
      (click)="addSlot()">

      + Add Time Slot

    </button>

    <button
      class="remove-slot"
      *ngIf="configSlots.length > 1"
      (click)="removeSlot(i)">
      ✕
    </button>

  </div>

  <p class="error" *ngIf="hasOverlap()">
    Time slots cannot overlap
  </p>

</div>
    <!-- ACTION BUTTONS -->

    <div class="buttons">

      <button class="apply-btn" (click)="applyHours()">
        Apply
      </button>

      <button class="cancel-btn" (click)="cancelConfig()">
        Cancel
      </button>

    </div>

  </div>

  <!-- CURRENT SCHEDULE -->

  <div class="card">

    <h3>Current Schedule</h3>

    <div class="schedule" *ngFor="let d of days">

      <span>{{d.name}}</span>

      <span *ngIf="d.mode==='closed'">Closed</span>

      <span *ngIf="d.mode==='24h'">24 Hours</span>

      <span *ngIf="d.mode==='custom' && d.slots.length">

        <span *ngFor="let s of d.slots; let last=last">

          {{s.open}} - {{s.close}}
          <span *ngIf="!last"> , </span>

        </span>

      </span>

      <span *ngIf="d.mode==='custom' && !d.slots.length">
        —
      </span>

    </div>

  </div>

  <!-- SAVE BUTTON -->

  <div class="save-section">

    <p class="error" *ngIf="errorMessage">
      {{errorMessage}}
    </p>

  <button
    class="save-btn"
    (click)="saveBusinessHours()">

    Save Business Hours

  </button>

  <p class="success" *ngIf="successMessage">
    {{successMessage}}
  </p>

</div>

</div>
