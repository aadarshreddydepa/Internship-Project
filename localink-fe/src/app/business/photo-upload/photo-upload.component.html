<div class="photo-upload-container">

  <h3>{{ 'PHOTO.TITLE' | translate }}</h3>

  <div
    class="upload-box"
    [class.has-image]="selectedImage"
    (click)="fileInput.click()"
    (dragover)="onDragOver($event)"
    (drop)="onDrop($event)"
  >

    <!-- Upload Area -->
    <div *ngIf="!selectedImage" class="upload-placeholder">

      <div class="upload-icon">{{ 'PHOTO.UPLOAD_ICON' | translate }}</div>

      <p>{{ 'PHOTO.DRAG_DROP' | translate }}</p>

      <span>{{ 'PHOTO.FORMAT' | translate }}</span>

    </div>
    <!-- Image Preview -->
    <div *ngIf="selectedImage" class="preview-wrapper">

      <img
        [src]="selectedImage"
        alt="{{ 'PHOTO.ALT' | translate }}"
        class="preview-image"
      />

      <button
        class="remove-btn"
        (click)="removeImage($event)"
      >
        {{ 'PHOTO.REMOVE' | translate }}
      </button>

    </div>

  </div>

  <input
    #fileInput
    type="file"
    accept=".jpg,.jpeg,.png"
    (change)="onFileSelected($event)"
    hidden
  />

  <div class="error" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

</div>
