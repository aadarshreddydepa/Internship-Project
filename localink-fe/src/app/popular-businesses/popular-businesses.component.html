<section class="popular-section">

  <div class="section-header">
    <h2 class="section-title">{{ 'DASHBOARD.POPULAR_THIS_WEEK' | translate }}</h2>
  </div>

  <div class="carousel">

    <div class="business-card" 
         *ngFor="let business of businesses">

      <!-- Favorite Button -->
      <button 
        class="favorite-btn-popular"
        [class.is-favorite]="business.isFavorite"
        (click)="toggleFavorite(business); $event.stopPropagation();"
        title="{{ business.isFavorite ? 'Remove from Favorites' : 'Add to Favorites' }}">
        <svg *ngIf="!business.isFavorite" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <svg *ngIf="business.isFavorite" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>

      <div class="card-clickable" (click)="goToBusinessDetail(business)">

        <div class="image-placeholder">
          <img 
            *ngIf="business.image" 
            [src]="business.image" 
            [alt]="business.name"/>
          <span *ngIf="!business.image">{{ 'DASHBOARD.NO_IMAGE' | translate }}</span>
        </div>

        <div class="card-content">

          <p class="category">
            {{ business.category | titlecase}}
          </p>

          <h3>{{ business.name }}</h3>

          <p class="description">
            {{ business.description }}
          </p>

          <div class="divider"></div>
          <div class="rating">
            <span class="stars">{{ getStars(business.rating) }}</span>
            <span class="rating-number">{{ business.rating }}/5</span>
          </div>

        </div>

      </div>

    </div>

  </div>

</section>
