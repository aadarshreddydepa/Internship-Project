<section class="popular-section">

  <div class="section-header">
    <h2 class="section-title">Popular This Week</h2>
    <span class="section-subtitle">{{ businesses.length }} businesses</span>
  </div>

  <div class="carousel">

    <div class="business-card" *ngFor="let business of businesses">

      <div class="image-placeholder">
        <img *ngIf="business.image" [src]="business.image" [alt]="business.name" />
        <span *ngIf="!business.image">No Image</span>
      </div>

      <div class="card-content">

        <p class="category">{{ business.category }}</p>

        <h3>{{ business.name }}</h3>

        <div class="divider"></div>

        <div class="rating">
          <span class="stars">{{ getStars(business.rating) }}</span>
          <span class="rating-number">{{ business.rating }}/5</span>
        </div>

      </div>

    </div>

  </div>

</section>
