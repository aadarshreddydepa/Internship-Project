<div class="favorites-container">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="back-btn" (click)="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1>My Favorites</h1>
    </div>
    <div class="header-right">
      <app-language-switcher class="header-language-switcher"></app-language-switcher>
    </div>
  </header>

  <!-- Loading State -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Loading your favorites...</p>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!isLoading && favoriteBusinesses.length === 0">
    <div class="empty-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </div>
    <h2>No Favorites Yet</h2>
    <p>Start exploring and add businesses you love!</p>
    <button class="explore-btn" (click)="goBack()">Explore Businesses</button>
  </div>

  <!-- Favorites Grid -->
  <div class="favorites-grid" *ngIf="!isLoading && paginatedBusinesses.length > 0">
    <div class="business-card" *ngFor="let business of paginatedBusinesses" (click)="goToBusinessDetail(business)">
      
      <!-- Remove Button -->
      <button class="remove-btn" (click)="$event.stopPropagation(); removeFavorite(business.id)" title="Remove from favorites">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>

      <!-- Image -->
      <div class="image-placeholder">
        <img *ngIf="business.primaryImage" [src]="business.primaryImage" [alt]="business.name"/>
        <span *ngIf="!business.primaryImage">No Image</span>
      </div>

      <!-- Content -->
      <div class="card-content">
        <p class="category">{{ business.categoryName | titlecase }}</p>
        <h3>{{ business.name }}</h3>
        <p class="description">{{ business.description }}</p>
        
        <div class="divider"></div>
        
        <div class="rating">
          <span class="stars">{{ getStars(business.rating || 0) }}</span>
          <span class="rating-number">{{ business.rating || 0 }}/5</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination" *ngIf="!isLoading && totalPages > 1">
    <button class="page-btn" [disabled]="currentPage === 1" (click)="previousPage()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    
    <div class="page-numbers">
      <button 
        *ngFor="let page of [].constructor(totalPages); let i = index" 
        class="page-number"
        [class.active]="currentPage === i + 1"
        (click)="goToPage(i + 1)">
        {{ i + 1 }}
      </button>
    </div>
    
    <button class="page-btn" [disabled]="currentPage === totalPages" (click)="nextPage()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </button>
  </div>
</div>
