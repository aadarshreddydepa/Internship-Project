<div class="error-page-container">
  <div class="error-content">
    <!-- Animated Background Elements -->
    <div class="bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>

    <!-- Error Icon -->
    <div class="error-icon-wrapper">
      <div class="error-icon" [class]="'icon-' + errorConfig.icon">
        <!-- 404 - Search/Broken Link Icon -->
        <svg *ngIf="errorConfig.icon === 'search'" viewBox="0 0 120 120" class="animated-icon">
          <circle cx="50" cy="50" r="25" fill="none" stroke="#C8A97E" stroke-width="3" class="search-circle"/>
          <line x1="70" y1="70" x2="95" y2="95" stroke="#C8A97E" stroke-width="3" stroke-linecap="round" class="search-line"/>
          <path d="M30 95 L50 75 L70 95" fill="none" stroke="#484948" stroke-width="2" class="broken-link-1"/>
          <path d="M50 75 L70 55 L90 75" fill="none" stroke="#484948" stroke-width="2" class="broken-link-2"/>
        </svg>

        <!-- 500 - Server Icon -->
        <svg *ngIf="errorConfig.icon === 'server'" viewBox="0 0 120 120" class="animated-icon">
          <rect x="25" y="15" width="70" height="30" rx="4" fill="#343434" stroke="#C8A97E" stroke-width="2" class="server-unit"/>
          <rect x="25" y="55" width="70" height="30" rx="4" fill="#343434" stroke="#C8A97E" stroke-width="2" class="server-unit"/>
          <rect x="25" y="95" width="70" height="10" rx="4" fill="#343434" stroke="#C8A97E" stroke-width="2" class="server-unit"/>
          <circle cx="35" cy="30" r="3" fill="#C8A97E" class="server-light server-light-1"/>
          <circle cx="45" cy="30" r="3" fill="#C8A97E" class="server-light server-light-2"/>
          <circle cx="35" cy="70" r="3" fill="#C8A97E" class="server-light server-light-3"/>
          <path d="M60 45 L60 55" stroke="#E74C3C" stroke-width="3" class="error-x error-x-1"/>
          <path d="M55 50 L65 50" stroke="#E74C3C" stroke-width="3" class="error-x error-x-2"/>
        </svg>

        <!-- 503 - Maintenance Icon -->
        <svg *ngIf="errorConfig.icon === 'maintenance'" viewBox="0 0 120 120" class="animated-icon">
          <circle cx="60" cy="60" r="30" fill="none" stroke="#C8A97E" stroke-width="3" class="gear-outer"/>
          <circle cx="60" cy="60" r="15" fill="#343434" stroke="#C8A97E" stroke-width="2" class="gear-inner"/>
          <rect x="55" y="10" width="10" height="15" rx="2" fill="#C8A97E" class="gear-tooth"/>
          <rect x="55" y="95" width="10" height="15" rx="2" fill="#C8A97E" class="gear-tooth"/>
          <rect x="10" y="55" width="15" height="10" rx="2" fill="#C8A97E" class="gear-tooth"/>
          <rect x="95" y="55" width="15" height="10" rx="2" fill="#C8A97E" class="gear-tooth"/>
          <rect x="22" y="22" width="10" height="10" rx="2" fill="#C8A97E" transform="rotate(45 27 27)" class="gear-tooth"/>
          <rect x="88" y="88" width="10" height="10" rx="2" fill="#C8A97E" transform="rotate(45 93 93)" class="gear-tooth"/>
          <rect x="22" y="88" width="10" height="10" rx="2" fill="#C8A97E" transform="rotate(-45 27 93)" class="gear-tooth"/>
          <rect x="88" y="22" width="10" height="10" rx="2" fill="#C8A97E" transform="rotate(-45 93 27)" class="gear-tooth"/>
        </svg>

        <!-- 401 - Lock Icon -->
        <svg *ngIf="errorConfig.icon === 'lock'" viewBox="0 0 120 120" class="animated-icon">
          <rect x="30" y="55" width="60" height="50" rx="5" fill="#343434" stroke="#C8A97E" stroke-width="3" class="lock-body"/>
          <path d="M40 55 L40 40 C40 28 50 18 60 18 C70 18 80 28 80 40 L80 55" fill="none" stroke="#C8A97E" stroke-width="3" class="lock-shackle"/>
          <circle cx="60" cy="80" r="8" fill="#C8A97E" class="lock-keyhole-outer"/>
          <rect x="57" y="80" width="6" height="12" rx="1" fill="#1C1C1C" class="lock-keyhole-inner"/>
          <line x1="85" y1="35" x2="95" y2="25" stroke="#E74C3C" stroke-width="3" stroke-linecap="round" class="lock-alert"/>
          <line x1="95" y1="35" x2="85" y2="25" stroke="#E74C3C" stroke-width="3" stroke-linecap="round" class="lock-alert"/>
        </svg>

        <!-- 403 - Shield Icon -->
        <svg *ngIf="errorConfig.icon === 'shield'" viewBox="0 0 120 120" class="animated-icon">
          <path d="M60 15 L95 25 L95 55 C95 80 60 105 60 105 C60 105 25 80 25 55 L25 25 Z" fill="#343434" stroke="#C8A97E" stroke-width="3" class="shield-body"/>
          <path d="M60 35 L60 75" stroke="#E74C3C" stroke-width="4" stroke-linecap="round" class="shield-x-1"/>
          <path d="M45 50 L75 50" stroke="#E74C3C" stroke-width="4" stroke-linecap="round" class="shield-x-2" transform="rotate(90 60 50)"/>
        </svg>

        <!-- Connection Error - WiFi Icon -->
        <svg *ngIf="errorConfig.icon === 'wifi'" viewBox="0 0 120 120" class="animated-icon">
          <circle cx="60" cy="95" r="6" fill="#C8A97E" class="wifi-dot"/>
          <path d="M30 70 Q60 40 90 70" fill="none" stroke="#484948" stroke-width="4" stroke-linecap="round" class="wifi-arc wifi-arc-3"/>
          <path d="M20 55 Q60 15 100 55" fill="none" stroke="#484948" stroke-width="4" stroke-linecap="round" class="wifi-arc wifi-arc-2"/>
          <path d="M10 40 Q60 -10 110 40" fill="none" stroke="#C8A97E" stroke-width="4" stroke-linecap="round" class="wifi-arc wifi-arc-1"/>
          <line x1="85" y1="25" x2="100" y2="10" stroke="#E74C3C" stroke-width="3" stroke-linecap="round" class="wifi-error-1"/>
          <line x1="100" y1="25" x2="85" y2="10" stroke="#E74C3C" stroke-width="3" stroke-linecap="round" class="wifi-error-2"/>
        </svg>

        <!-- Timeout - Clock Icon -->
        <svg *ngIf="errorConfig.icon === 'clock'" viewBox="0 0 120 120" class="animated-icon">
          <circle cx="60" cy="60" r="45" fill="#343434" stroke="#C8A97E" stroke-width="3" class="clock-face"/>
          <line x1="60" y1="25" x2="60" y2="20" stroke="#C8A97E" stroke-width="3" stroke-linecap="round" class="clock-tick"/>
          <line x1="60" y1="105" x2="60" y2="100" stroke="#C8A97E" stroke-width="3" stroke-linecap="round" class="clock-tick"/>
          <line x1="25" y1="60" x2="20" y2="60" stroke="#C8A97E" stroke-width="3" stroke-linecap="round" class="clock-tick"/>
          <line x1="105" y1="60" x2="100" y2="60" stroke="#C8A97E" stroke-width="3" stroke-linecap="round" class="clock-tick"/>
          <line x1="60" y1="60" x2="60" y2="35" stroke="#C8A97E" stroke-width="3" stroke-linecap="round" class="clock-hand hour-hand"/>
          <line x1="60" y1="60" x2="75" y2="75" stroke="#C8A97E" stroke-width="3" stroke-linecap="round" class="clock-hand minute-hand"/>
          <path d="M85 25 L95 15" stroke="#E74C3C" stroke-width="3" stroke-linecap="round" class="clock-alert"/>
          <path d="M95 25 L85 15" stroke="#E74C3C" stroke-width="3" stroke-linecap="round" class="clock-alert"/>
        </svg>

        <!-- Generic Alert Icon -->
        <svg *ngIf="errorConfig.icon === 'alert'" viewBox="0 0 120 120" class="animated-icon">
          <path d="M60 15 L105 100 L15 100 Z" fill="#343434" stroke="#C8A97E" stroke-width="3" class="alert-triangle"/>
          <line x1="60" y1="45" x2="60" y2="70" stroke="#F8F4F0" stroke-width="4" stroke-linecap="round" class="alert-exclamation"/>
          <circle cx="60" cy="85" r="4" fill="#F8F4F0" class="alert-dot"/>
        </svg>
      </div>
    </div>

    <!-- Error Code -->
    <div class="error-code">
      <span class="error-code-digit" *ngFor="let char of errorConfig.code.split('')">{{ char }}</span>
    </div>

    <!-- Error Title -->
    <h1 class="error-title">{{ errorConfig.title }}</h1>

    <!-- Error Message -->
    <p class="error-message">{{ errorConfig.message }}</p>

    <!-- Action Buttons -->
    <div class="error-actions">
      <button class="btn btn-primary" (click)="handlePrimaryAction()">
        <span class="btn-icon">
          <svg *ngIf="errorConfig.code === '401'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10,17 15,12 10,7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          <svg *ngIf="errorConfig.code === 'connection' || errorConfig.code === 'timeout'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23,4 23,10 17,10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          <svg *ngIf="errorConfig.code !== '401' && errorConfig.code !== 'connection' && errorConfig.code !== 'timeout'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9,22 9,12 15,12 15,22"/>
          </svg>
        </span>
        {{ errorConfig.actionText }}
      </button>

      <button class="btn btn-secondary" (click)="handleSecondaryAction()" *ngIf="errorConfig.secondaryActionText">
        {{ errorConfig.secondaryActionText }}
      </button>
    </div>

    <!-- Decorative Footer -->
    <div class="error-footer">
      <div class="footer-line"></div>
      <p class="footer-text">Localink</p>
      <div class="footer-line"></div>
    </div>
  </div>
</div>
