<div class="container">

  <h1 class="title">Discover Local Businesses</h1>
  <p class="subtitle">Find the best services near you</p>

  <h2 class="section-title">Browse by Category</h2>

  <div class="grid">

    <div
      class="category-card"
      *ngFor="let category of categories"
      (click)="openCategory(category)"
    >

      <div class="icon">
        <img *ngIf="category.iconUrl"  [src]="category.iconUrl" width="24" height="24" />
      </div>

      <div class="content">
        <div class="name">{{category.name}}</div>
        <div class="link">View subcategories →</div>
      </div>

    </div>

  </div>

</div>
