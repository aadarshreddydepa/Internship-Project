<div class="container">

  <h1 class="title">{{ 'DASHBOARD.HERO_TITLE' | translate }}</h1>
  <p class="subtitle">{{ 'DASHBOARD.HERO_SUBTITLE' | translate }}</p>

  <h2 class="section-title">{{ 'DASHBOARD.BROWSE_CATEGORY' | translate }}</h2>

  <div class="grid">

    <div
      class="category-card"
      *ngFor="let category of categories"
      (click)="openCategory(category)"
    >

      <div class="icon">
        <img *ngIf="category.iconUrl"  [src]="category.iconUrl" width="24" height="24" />
      </div>

      <div class="content">
        <div class="name">{{category.name}}</div>
        <div class="link">{{ 'DASHBOARD.VIEW_SUBCATEGORIES' | translate }}</div>
      </div>

    </div>

  </div>

</div>
