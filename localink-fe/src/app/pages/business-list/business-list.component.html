<div class="container">

  <!-- HEADER -->
  <div class="page-header">

    <a [routerLink]="['/subcategory', category]" class="back">
      ← Back
    </a>

    <div class="title-section">
      <h1>{{ subcategory | titlecase }}</h1>
      <p>{{ businesses.length }} businesses found</p>
    </div>

  </div>

  <div class="divider"></div>


  <!-- BUSINESS LIST -->

  <div class="business-card"
       *ngFor="let b of paginatedBusinesses"
       [routerLink]="['/business', b.name]"
       style="cursor:pointer">

    <!-- IMAGE -->
    <div class="image">
      Image
    </div>


    <!-- BUSINESS INFO -->
    <div class="info">

      <div class="title-row">
        <h3>{{ b.name }}</h3>
      </div>

      <p class="desc">{{ b.description }}</p>

      <div class="rating">
        ⭐ {{ b.rating }} ({{ b.reviews }} reviews)
      </div>

      <div class="details">

        <span>📞 {{ b.phone }}</span>

        <span>📍 {{ b.address }}</span>

        <span>🕒 {{ b.hours }}</span>

      </div>

    </div>

    <div class="arrow">›</div>

  </div>


  <!-- PAGINATION -->

  <div class="pagination" *ngIf="totalPages > 1">

    <button (click)="changePage(currentPage-1)">
      Previous
    </button>

    <button
      *ngFor="let page of [].constructor(totalPages); let i = index"
      (click)="changePage(i+1)"
      [class.active]="currentPage === i+1"
    >
      {{ i+1 }}
    </button>

    <button (click)="changePage(currentPage+1)">
      Next
    </button>

  </div>

</div>
