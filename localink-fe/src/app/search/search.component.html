<div class="container">
<!-- HEADER -->
<header class="header">
<div class="logo">Localink</div>
<div class="actions">
<button class="add-btn">+ Add Business</button>
<div class="profile">👤</div>
</div>
</header>

<!-- HERO SECTION -->
<div class="hero">
<h1>Discover Local Businesses</h1>
<p>Find the best services near you</p>
</div>

<!-- CATEGORY SECTION -->
<section class="categories">
<h2>Browse by Category</h2>
<div class="category-grid">
<div
class="category-card"
*ngFor="let category of categories">
<div class="icon">{{category.icon}}</div>
<div class="text">
<h3>{{category.name}}</h3>
<p>View subcategories →</p>
</div>
</div>
</div>
</section>

<!-- POPULAR SECTION -->
<section class="popular">
<h2>Popular This Week</h2>
<app-popular-businesses></app-popular-businesses>
</section>
</div>
