<div class="container">

<!-- HEADER -->

<header class="header">

<div class="logo">
Localink
</div>

<div class="actions">

<div class="profile" (click)="goToProfile()">

<svg xmlns="http://www.w3.org/2000/svg"
width="22"
height="22"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
<circle cx="12" cy="7" r="4"/>

</svg>

</div>

</div>

</header>


<!-- SEARCH BAR -->

<div class="search-bar">

<svg xmlns="http://www.w3.org/2000/svg"
width="20"
height="20"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<circle cx="11" cy="11" r="8"/>
<line x1="21" y1="21" x2="16.65" y2="16.65"/>

</svg>

<input
type="text"
placeholder="Search for businesses or services..."
>

</div>


<!-- HERO -->

<div class="hero">

<h1>Discover Local Businesses</h1>

<p>
Find the best services near you
</p>

</div>



<!-- CATEGORY -->

<section class="categories">

<h2>Browse by Category</h2>

<div class="category-grid">


<div
class="category-card"
*ngFor="let category of categories">

<div class="icon">

<!-- MEDICAL -->
<svg *ngIf="category.id === 'medical'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M12 2v20M2 12h20"/>
</svg>

<!-- FOOD -->
<svg *ngIf="category.id === 'food'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M4 2v20M10 2v20M16 6v16"/>
</svg>

<!-- GENERAL -->
<svg *ngIf="category.id === 'general'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<circle cx="9" cy="21" r="1"/>
<circle cx="20" cy="21" r="1"/>
<path d="M1 1h4l2.7 13h11.3l3-8H6"/>
</svg>

<!-- TUTORING -->
<svg *ngIf="category.id === 'tutoring'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M22 10l-10-5-10 5 10 5 10-5z"/>
<path d="M6 12v5c3 2 9 2 12 0v-5"/>
</svg>

<!-- REPAIR -->
<svg *ngIf="category.id === 'repair'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M14.7 6.3a4 4 0 1 0 3 3L22 14l-4 4-4-4 4-4z"/>
</svg>

<!-- HOME -->
<svg *ngIf="category.id === 'home'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M3 12l9-9 9 9"/>
<path d="M9 21V9h6v12"/>
</svg>

</div>

<div class="text">

<h3>{{category.name}}</h3>

<p>View subcategories →</p>

</div>

</div>

</div>

</section>


<!-- POPULAR -->

<section class="popular">

<app-popular-businesses></app-popular-businesses>

</section>


</div>
