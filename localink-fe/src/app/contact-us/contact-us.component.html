<div class="container">

  <!-- HEADER -->
  <header class="header">
    <div class="logo" (click)="scrollToTop()">Localink</div>

    <div class="header-right">
      <h2 class="welcome">Welcome, {{ username || 'User' }}</h2>

      <div class="profile" (click)="toggleProfile()">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
    </div>
  </header>

  <!-- CONTACT CONTENT -->
  <div class="contact-container">

    <h2>Contact Us</h2>

    <div class="contact-info">

      <!-- EMAIL -->
      <div class="label-row">
        <span class="icon">📧</span>
        <label>Email</label>
      </div>
      <input 
        type="text" 
        class="input-field" 
        value="support@localink.com"
        readonly
      />

      <!-- PHONE -->
      <div class="label-row">
        <span class="icon">📞</span>
        <label>Phone</label>
      </div>
      <input 
        type="text" 
        class="input-field" 
        value="+91 9876543210"
        readonly
      />

    </div>

    <p class="feedback-text">
      We’d love to hear your feedback. Let us know how we can improve your experience.
    </p>

    <form (ngSubmit)="submitFeedback()">

      <textarea 
        [(ngModel)]="feedbackText"
        name="feedback"
        required
        placeholder="Enter your feedback..."
      ></textarea>

      <button type="submit">Submit</button>

    </form>

    <p *ngIf="successMessage" class="success-message">
      {{ successMessage }}
    </p>

  </div>

</div>

<!-- PROFILE DRAWER -->
<div class="overlay" *ngIf="showProfile" (click)="closeProfile()"></div>

<div class="profile-drawer" [class.open]="showProfile">
  <app-profile></app-profile>
</div>
