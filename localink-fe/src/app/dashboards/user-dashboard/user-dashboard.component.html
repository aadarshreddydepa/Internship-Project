<div class="container">

  <header class="header">

    <div class="logo" (click)="scrollToTop()">Localink</div>

    <div class="header-right">

      <h2 class="welcome">Welcome, {{ username }}</h2>

      <div class="profile" (click)="goToProfile()">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>

    </div>

  </header>

  <div class="search-bar">

    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>

    <input
      type="text"
      placeholder="Search for businesses or services..."
      [(ngModel)]="searchTerm"
    />

  </div>

  <div class="hero">
    <h1>Discover Local Businesses</h1>
    <p>Find the best services near you</p>
  </div>

  <section class="categories">

    <h2>Browse by Category</h2>

    <p *ngIf="filteredCategories.length === 0" class="no-results">
      No categories match "{{ searchTerm }}".
    </p>

    <div class="category-grid">

      <div class="category-card"
     *ngFor="let category of filteredCategories"
     (click)="openCategory(category.id)">

  <div class="icon">
    <img [src]="category.iconUrl"
         alt="icon"
         width="24"
         height="24"
         style="object-fit: contain;" />
  </div>

  <div class="text">
    <h3>{{ category.name | titlecase}}</h3>
    <p>View subcategories →</p>
  </div>

</div>
    </div>

  </section>

  <section class="popular">
    <app-popular-businesses></app-popular-businesses>
  </section>

</div>
